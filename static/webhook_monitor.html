<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnchorKit Webhook Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f7fa;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 24px 32px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1a202c;
        }

        .subtitle {
            color: #718096;
            font-size: 14px;
            margin-top: 4px;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
        }

        .status.listening {
            background: #c6f6d5;
            color: #22543d;
        }

        .status.stopped {
            background: #fed7d7;
            color: #742a2a;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status.listening .status-dot {
            background: #38a169;
        }

        .status.stopped .status-dot {
            background: #e53e3e;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #4299e1;
            color: white;
        }

        .btn-primary:hover {
            background: #3182ce;
        }

        .btn-danger {
            background: #e53e3e;
            color: white;
        }

        .btn-danger:hover {
            background: #c53030;
        }

        .btn-secondary {
            background: #edf2f7;
            color: #2d3748;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .filters {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 16px 24px;
            margin-bottom: 20px;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-size: 14px;
            color: #4a5568;
            font-weight: 500;
        }

        select {
            padding: 6px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }

        .stat-label {
            font-size: 12px;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 600;
            color: #1a202c;
        }

        .events-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .events-header {
            padding: 16px 24px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .events-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1a202c;
        }

        .events-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .event-item {
            padding: 16px 24px;
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.2s;
        }

        .event-item:hover {
            background: #f7fafc;
        }

        .event-item:last-child {
            border-bottom: none;
        }

        .event-item.new {
            animation: highlight 1s ease-out;
        }

        @keyframes highlight {
            0% { background: #bee3f8; }
            100% { background: transparent; }
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .event-type {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
        }

        .event-type.deposit {
            background: #c6f6d5;
            color: #22543d;
        }

        .event-type.withdrawal {
            background: #feebc8;
            color: #7c2d12;
        }

        .event-type.kyc {
            background: #bee3f8;
            color: #1a365d;
        }

        .event-type.quote {
            background: #e9d8fd;
            color: #44337a;
        }

        .event-type.transfer {
            background: #fed7e2;
            color: #702459;
        }

        .event-type.session {
            background: #fef5e7;
            color: #744210;
        }

        .event-type.attestation {
            background: #e2e8f0;
            color: #2d3748;
        }

        .event-type.other {
            background: #edf2f7;
            color: #4a5568;
        }

        .event-icon {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .event-time {
            font-size: 12px;
            color: #718096;
        }

        .event-id {
            font-size: 12px;
            color: #a0aec0;
            margin-top: 4px;
        }

        .event-details {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 8px 16px;
            margin-top: 12px;
            font-size: 13px;
        }

        .detail-label {
            color: #718096;
            font-weight: 500;
        }

        .detail-value {
            color: #2d3748;
            word-break: break-all;
        }

        .payload-toggle {
            margin-top: 12px;
            padding: 8px 12px;
            background: #edf2f7;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            color: #4a5568;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .payload-toggle:hover {
            background: #e2e8f0;
        }

        .payload-toggle-icon {
            transition: transform 0.2s;
        }

        .payload-toggle.expanded .payload-toggle-icon {
            transform: rotate(180deg);
        }

        .payload-content {
            display: none;
            margin-top: 8px;
            padding: 12px;
            background: #2d3748;
            border-radius: 4px;
            overflow-x: auto;
        }

        .payload-content.show {
            display: block;
        }

        .payload-content pre {
            margin: 0;
            color: #e2e8f0;
            font-size: 12px;
            font-family: 'Monaco', 'Courier New', monospace;
            line-height: 1.5;
        }

        .empty-state {
            padding: 60px 24px;
            text-align: center;
            color: #718096;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .empty-state-subtext {
            font-size: 14px;
            color: #a0aec0;
        }

        /* Export buttons */
        .export-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-export {
            padding: 8px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            background: white;
            color: #4a5568;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-export:hover {
            background: #edf2f7;
            border-color: #a0aec0;
        }

        /* Search box */
        .search-box {
            padding: 8px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 14px;
            width: 200px;
        }

        .search-box:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        /* Date range picker */
        .date-range {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .date-range input {
            padding: 6px 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 13px;
        }

        .date-range input:focus {
            outline: none;
            border-color: #4299e1;
        }

        /* Status filter */
        .status-filter {
            padding: 6px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        /* Real-time counter */
        .live-counter {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #c6f6d5;
            border-radius: 6px;
            color: #22543d;
            font-size: 14px;
            font-weight: 500;
        }

        .live-counter .dot {
            width: 8px;
            height: 8px;
            background: #38a169;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Filter panel */
        .filter-panel {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 16px 24px;
            margin-bottom: 20px;
        }

        .filter-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .filter-panel-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a202c;
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-size: 13px;
            color: #4a5568;
            font-weight: 500;
            white-space: nowrap;
        }

        .filter-group select,
        .filter-group input {
            padding: 6px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        .filter-actions {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .btn-clear-filters {
            padding: 6px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            background: white;
            color: #4a5568;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-clear-filters:hover {
            background: #edf2f7;
        }

        /* Event status badges */
        .event-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .event-status.success {
            background: #c6f6d5;
            color: #22543d;
        }

        .event-status.failed {
            background: #fed7d7;
            color: #742a2a;
        }

        .event-status.pending {
            background: #feebc8;
            color: #7c2d12;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>Webhook Event Monitor</h1>
                <p class="subtitle">Real-time anchor callback debugging</p>
            </div>
            <div class="controls">
                <div class="status listening" id="status">
                    <span class="status-dot"></span>
                    <span id="statusText">Listening</span>
                </div>
                <button class="btn btn-secondary" onclick="clearEvents()">Clear</button>
                <button class="btn btn-danger" id="toggleBtn" onclick="toggleMonitoring()">Stop</button>
            </div>
        </div>

        <div class="filter-panel">
            <div class="filter-panel-header">
                <span class="filter-panel-title">🔍 Filter Events</span>
                <div class="live-counter" id="liveCounter" style="display: none;">
                    <span class="dot"></span>
                    <span id="filteredCount">0</span> events
                </div>
            </div>
            <div class="filter-row">
                <div class="filter-group">
                    <label for="eventTypeFilter">Event Type:</label>
                    <select id="eventTypeFilter" onchange="applyFilters()">
                        <option value="all">All Events</option>
                        <option value="deposit">Deposits</option>
                        <option value="withdrawal">Withdrawals</option>
                        <option value="kyc">KYC Updates</option>
                        <option value="attestation">Attestations</option>
                        <option value="quote">Quotes</option>
                        <option value="transfer">Transfers</option>
                        <option value="session">Sessions</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="anchorFilter">Anchor:</label>
                    <select id="anchorFilter" onchange="applyFilters()">
                        <option value="all">All Anchors</option>
                        <option value="example-anchor">Example Anchor</option>
                        <option value="stablecoin">Stablecoin Issuer</option>
                        <option value="fiat-ramp">Fiat On/Off Ramp</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="statusFilter">Status:</label>
                    <select id="statusFilter" onchange="applyFilters()">
                        <option value="all">All Statuses</option>
                        <option value="success">Success</option>
                        <option value="failed">Failed</option>
                        <option value="pending">Pending</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Date Range:</label>
                    <div class="date-range">
                        <input type="date" id="dateFrom" onchange="applyFilters()" title="From date">
                        <span>to</span>
                        <input type="date" id="dateTo" onchange="applyFilters()" title="To date">
                    </div>
                </div>
                <div class="filter-group">
                    <label for="searchBox">Search:</label>
                    <input type="text" id="searchBox" class="search-box" placeholder="Transaction ID or Request ID" oninput="applyFilters()">
                </div>
                <div class="filter-actions">
                    <button class="btn-export" onclick="exportJSON()">
                        <span>📥</span> JSON
                    </button>
                    <button class="btn-export" onclick="exportCSV()">
                        <span>📊</span> CSV
                    </button>
                    <button class="btn-clear-filters" onclick="clearFilters()">Clear Filters</button>
                </div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Total Events</div>
                <div class="stat-value" id="totalEvents">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Last Event</div>
                <div class="stat-value" id="lastEvent" style="font-size: 16px; color: #718096;">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Events/Min</div>
                <div class="stat-value" id="eventsPerMin">0</div>
            </div>
        </div>

        <div class="events-container">
            <div class="events-header">
                <h2>Events</h2>
                <span id="eventCount" style="color: #718096; font-size: 14px;">0 events</span>
            </div>
            <div class="events-list" id="eventsList">
                <div class="empty-state">
                    <div class="empty-state-icon">📡</div>
                    <div class="empty-state-text">Waiting for webhook events...</div>
                    <div class="empty-state-subtext">Events will appear here in real-time</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let events = [];
        let isMonitoring = true;
        let eventCounter = 0;
        let recentEvents = [];

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadFiltersFromURL();
            // Simulate loading some initial events
            simulateInitialEvents();
        });

        // Simulate initial events for demo
        function simulateInitialEvents() {
            const sampleEvents = [
                { type: 'deposit', data: { amount: 1000, asset: 'USDC', user: 'GABC123XYZ', anchor: 'example-anchor', status: 'success', transaction_id: 'tx_001' } },
                { type: 'withdrawal', data: { amount: 500, asset: 'USDC', user: 'GDEF456ABC', anchor: 'stablecoin', status: 'success', transaction_id: 'tx_002' } },
                { type: 'kyc', data: { user: 'GHIJ789DEF', status: 'approved', level: 2, anchor: 'fiat-ramp', request_id: 'req_001', status: 'success' } },
                { type: 'quote', data: { pair: 'USDC/USD', rate: 1.0, quote_id: 42, anchor: 'example-anchor', status: 'pending' } },
                { type: 'attestation', data: { attestation_id: 456, subject: 'GDEFABC', issuer: 'GHIJDEF', anchor: 'stablecoin', status: 'success' } }
            ];

            sampleEvents.forEach((eventData, index) => {
                setTimeout(() => {
                    const event = {
                        id: ++eventCounter,
                        type: eventData.type,
                        timestamp: new Date(Date.now() - (sampleEvents.length - index) * 60000).toISOString(),
                        payload: eventData.data
                    };
                    addEvent(event);
                }, index * 200);
            });
        }

        // Simulate webhook events for demo (replace with actual WebSocket/SSE in production)
        function simulateWebhookEvent() {
            if (!isMonitoring) return;

            const eventTypes = [
                { type: 'deposit', data: { amount: 1000, asset: 'USDC', user: 'GABC...XYZ', anchor: 'example-anchor', status: 'success', transaction_id: 'tx_' + Date.now() } },
                { type: 'withdrawal', data: { amount: 500, asset: 'USDC', user: 'GDEF...ABC', anchor: 'stablecoin', status: 'success', destination: '0x123...789', transaction_id: 'tx_' + Date.now() } },
                { type: 'kyc', data: { user: 'GHIJ...DEF', status: 'approved', level: 2, anchor: 'fiat-ramp', request_id: 'req_' + Date.now(), status: 'success' } },
                { type: 'quote', data: { pair: 'USDC/USD', rate: 1.0, quote_id: Math.floor(Math.random() * 100), anchor: 'example-anchor', status: 'pending' } },
                { type: 'transfer', data: { transfer_id: 123, from: 'GABC...XYZ', to: 'GDEF...ABC', amount: 250, anchor: 'stablecoin', status: 'success' } },
                { type: 'session', data: { session_id: 789, initiator: 'GABC...XYZ', anchor: 'example-anchor', status: 'success' } },
                { type: 'attestation', data: { attestation_id: 456, subject: 'GDEF...ABC', issuer: 'GHIJ...DEF', anchor: 'fiat-ramp', status: 'success' } }
            ];

            const randomEvent = eventTypes[Math.floor(Math.random() * eventTypes.length)];
            
            const event = {
                id: ++eventCounter,
                type: randomEvent.type,
                timestamp: new Date().toISOString(),
                payload: randomEvent.data
            };

            addEvent(event);
        }

        function addEvent(event) {
            events.unshift(event);
            recentEvents.push(Date.now());
            
            // Keep only last 100 events
            if (events.length > 100) {
                events.pop();
            }

            // Keep only events from last minute for rate calculation
            const oneMinuteAgo = Date.now() - 60000;
            recentEvents = recentEvents.filter(time => time > oneMinuteAgo);

            updateStats();
            renderEvents();
            updateURL();
        }

        function getFilteredEvents() {
            const eventType = document.getElementById('eventTypeFilter').value;
            const anchor = document.getElementById('anchorFilter').value;
            const status = document.getElementById('statusFilter').value;
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;
            const search = document.getElementById('searchBox').value.toLowerCase();

            return events.filter(event => {
                // Event type filter
                if (eventType !== 'all' && event.type !== eventType) {
                    return false;
                }

                // Anchor filter
                if (anchor !== 'all' && event.payload.anchor !== anchor) {
                    return false;
                }

                // Status filter
                if (status !== 'all' && event.payload.status !== status) {
                    return false;
                }

                // Date range filter
                if (dateFrom) {
                    const eventDate = new Date(event.timestamp).toISOString().split('T')[0];
                    if (eventDate < dateFrom) {
                        return false;
                    }
                }
                if (dateTo) {
                    const eventDate = new Date(event.timestamp).toISOString().split('T')[0];
                    if (eventDate > dateTo) {
                        return false;
                    }
                }

                // Search filter (transaction ID or request ID)
                if (search) {
                    const transactionId = event.payload.transaction_id || '';
                    const requestId = event.payload.request_id || '';
                    const user = event.payload.user || '';
                    
                    if (!transactionId.toLowerCase().includes(search) &&
                        !requestId.toLowerCase().includes(search) &&
                        !user.toLowerCase().includes(search)) {
                        return false;
                    }
                }

                return true;
            });
        }

        function renderEvents() {
            const eventsList = document.getElementById('eventsList');
            const filteredEvents = getFilteredEvents();
            
            // Update live counter
            const liveCounter = document.getElementById('liveCounter');
            const filteredCount = document.getElementById('filteredCount');
            if (events.length > 0) {
                liveCounter.style.display = 'flex';
                filteredCount.textContent = filteredEvents.length;
            }

            if (filteredEvents.length === 0) {
                eventsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📡</div>
                        <div class="empty-state-text">No events to display</div>
                        <div class="empty-state-subtext">Try adjusting your filters</div>
                    </div>
                `;
                return;
            }

            eventsList.innerHTML = filteredEvents.map(event => `
                <div class="event-item ${event.id === eventCounter ? 'new' : ''}" data-event-id="${event.id}">
                    <div class="event-header">
                        <div>
                            <span class="event-type ${event.type}">
                                <span class="event-icon"></span>
                                ${formatEventType(event.type)}
                            </span>
                            ${event.payload.status ? `<span class="event-status ${event.payload.status}">${event.payload.status}</span>` : ''}
                            <div class="event-id">Event #${event.id}</div>
                        </div>
                        <div class="event-time">${formatTime(event.timestamp)}</div>
                    </div>
                    
                    <div class="event-details">
                        ${renderEventDetails(event)}
                    </div>

                    <button class="payload-toggle" onclick="togglePayload(${event.id})">
                        <span>View Raw Payload</span>
                        <span class="payload-toggle-icon">▼</span>
                    </button>
                    <div class="payload-content" id="payload-${event.id}">
                        <pre>${JSON.stringify(event.payload, null, 2)}</pre>
                    </div>
                </div>
            `).join('');

            document.getElementById('eventCount').textContent = `${filteredEvents.length} event${filteredEvents.length !== 1 ? 's' : ''}`;
        }

        function renderEventDetails(event) {
            const details = [];
            
            // Add anchor if present
            if (event.payload.anchor) {
                details.push(['Anchor', event.payload.anchor]);
            }
            
            // Add transaction ID if present
            if (event.payload.transaction_id) {
                details.push(['Transaction ID', event.payload.transaction_id]);
            }
            
            // Add request ID if present
            if (event.payload.request_id) {
                details.push(['Request ID', event.payload.request_id]);
            }
            
            switch(event.type) {
                case 'deposit':
                    details.push(['Amount', `${event.payload.amount} ${event.payload.asset}`]);
                    details.push(['User', event.payload.user]);
                    break;
                case 'withdrawal':
                    details.push(['Amount', `${event.payload.amount} ${event.payload.asset}`]);
                    details.push(['User', event.payload.user]);
                    details.push(['Destination', event.payload.destination]);
                    break;
                case 'kyc':
                    details.push(['User', event.payload.user]);
                    details.push(['Status', event.payload.status]);
                    details.push(['Level', event.payload.level]);
                    break;
                case 'quote':
                    details.push(['Pair', event.payload.pair]);
                    details.push(['Rate', event.payload.rate]);
                    details.push(['Quote ID', event.payload.quote_id]);
                    break;
                case 'transfer':
                    details.push(['Transfer ID', event.payload.transfer_id]);
                    details.push(['From', event.payload.from]);
                    details.push(['To', event.payload.to]);
                    details.push(['Amount', event.payload.amount]);
                    break;
                case 'session':
                    details.push(['Session ID', event.payload.session_id]);
                    details.push(['Initiator', event.payload.initiator]);
                    break;
                case 'attestation':
                    details.push(['Attestation ID', event.payload.attestation_id]);
                    details.push(['Subject', event.payload.subject]);
                    details.push(['Issuer', event.payload.issuer]);
                    break;
            }

            return details.map(([label, value]) => `
                <span class="detail-label">${label}:</span>
                <span class="detail-value">${value}</span>
            `).join('');
        }

        function formatEventType(type) {
            return type.charAt(0).toUpperCase() + type.slice(1);
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString() + '.' + date.getMilliseconds().toString().padStart(3, '0');
        }

        function togglePayload(eventId) {
            const payload = document.getElementById(`payload-${eventId}`);
            const button = payload.previousElementSibling;
            
            payload.classList.toggle('show');
            button.classList.toggle('expanded');
        }

        function updateStats() {
            document.getElementById('totalEvents').textContent = events.length;
            
            if (events.length > 0) {
                const lastEventTime = new Date(events[0].timestamp);
                const now = new Date();
                const diff = Math.floor((now - lastEventTime) / 1000);
                
                if (diff < 1) {
                    document.getElementById('lastEvent').textContent = 'Just now';
                } else if (diff < 60) {
                    document.getElementById('lastEvent').textContent = `${diff}s ago`;
                } else {
                    document.getElementById('lastEvent').textContent = `${Math.floor(diff / 60)}m ago`;
                }
            }

            document.getElementById('eventsPerMin').textContent = recentEvents.length;
        }

        function toggleMonitoring() {
            isMonitoring = !isMonitoring;
            
            const status = document.getElementById('status');
            const statusText = document.getElementById('statusText');
            const toggleBtn = document.getElementById('toggleBtn');
            
            if (isMonitoring) {
                status.className = 'status listening';
                statusText.textContent = 'Listening';
                toggleBtn.textContent = 'Stop';
                toggleBtn.className = 'btn btn-danger';
            } else {
                status.className = 'status stopped';
                statusText.textContent = 'Stopped';
                toggleBtn.textContent = 'Start';
                toggleBtn.className = 'btn btn-primary';
            }
        }

        function clearEvents() {
            if (confirm('Clear all events?')) {
                events = [];
                eventCounter = 0;
                recentEvents = [];
                updateStats();
                renderEvents();
                updateURL();
            }
        }

        function applyFilters() {
            renderEvents();
            updateURL();
        }

        function clearFilters() {
            document.getElementById('eventTypeFilter').value = 'all';
            document.getElementById('anchorFilter').value = 'all';
            document.getElementById('statusFilter').value = 'all';
            document.getElementById('dateFrom').value = '';
            document.getElementById('dateTo').value = '';
            document.getElementById('searchBox').value = '';
            applyFilters();
        }

        // Export to JSON
        function exportJSON() {
            const filteredEvents = getFilteredEvents();
            const exportData = filteredEvents.map(event => ({
                id: event.id,
                type: event.type,
                timestamp: event.timestamp,
                anchor: event.payload.anchor || null,
                status: event.payload.status || null,
                transaction_id: event.payload.transaction_id || null,
                request_id: event.payload.request_id || null,
                payload: event.payload
            }));

            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `webhook-events-${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Export to CSV
        function exportCSV() {
            const filteredEvents = getFilteredEvents();
            
            // Flatten event data for CSV
            const csvRows = [];
            
            // Header row
            csvRows.push(['ID', 'Type', 'Timestamp', 'Anchor', 'Status', 'Transaction ID', 'Request ID', 'Details'].join(','));
            
            // Data rows
            filteredEvents.forEach(event => {
                const row = [
                    event.id,
                    event.type,
                    event.timestamp,
                    event.payload.anchor || '',
                    event.payload.status || '',
                    event.payload.transaction_id || '',
                    event.payload.request_id || '',
                    JSON.stringify(event.payload).replace(/"/g, '""') // Escape quotes
                ];
                csvRows.push(row.map(field => `"${field}"`).join(','));
            });

            const csvContent = csvRows.join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `webhook-events-${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Update URL with filter state
        function updateURL() {
            const params = new URLSearchParams();
            
            const eventType = document.getElementById('eventTypeFilter').value;
            const anchor = document.getElementById('anchorFilter').value;
            const status = document.getElementById('statusFilter').value;
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;
            const search = document.getElementById('searchBox').value;

            if (eventType !== 'all') params.set('type', eventType);
            if (anchor !== 'all') params.set('anchor', anchor);
            if (status !== 'all') params.set('status', status);
            if (dateFrom) params.set('from', dateFrom);
            if (dateTo) params.set('to', dateTo);
            if (search) params.set('search', search);

            const newURL = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
            window.history.replaceState({}, '', newURL);
        }

        // Load filters from URL
        function loadFiltersFromURL() {
            const params = new URLSearchParams(window.location.search);
            
            if (params.has('type')) {
                document.getElementById('eventTypeFilter').value = params.get('type');
            }
            if (params.has('anchor')) {
                document.getElementById('anchorFilter').value = params.get('anchor');
            }
            if (params.has('status')) {
                document.getElementById('statusFilter').value = params.get('status');
            }
            if (params.has('from')) {
                document.getElementById('dateFrom').value = params.get('from');
            }
            if (params.has('to')) {
                document.getElementById('dateTo').value = params.get('to');
            }
            if (params.has('search')) {
                document.getElementById('searchBox').value = params.get('search');
            }
        }

        // Simulate events every 2-5 seconds (for demo)
        setInterval(() => {
            if (isMonitoring && Math.random() > 0.3) {
                simulateWebhookEvent();
            }
        }, 3000);

        // Update "last event" time every second
        setInterval(updateStats, 1000);

        // Initial render
        renderEvents();
    </script>
</body>
</html>
